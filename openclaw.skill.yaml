name: openclaw-pdf-to-cad
display_name: OpenClaw PDF to CAD
kind: agent_skill
target_runtime: openclaw
runtime: local_script
description: Convert PDF engineering drawings into CAD-oriented delivery packages for OpenClaw agents.
entrypoint: skills/openclaw-pdf-to-cad/scripts/run_pdf_to_cad.sh
skill_dir: skills/openclaw-pdf-to-cad
supported_inputs:
  - .pdf
unsupported_inputs:
  - .step
  - .stp
  - .iges
  - .igs
  - .stl
  - .sldprt
  - .sldasm
outputs:
  - layered DXF
  - optional DWG
  - PNG preview
  - PDF preview
  - quality_report.json
  - delivery README
  - zip package
quality_policy:
  no_guessing_dimensions: true
  scanned_or_mixed_pdf_requires_review: true
  report_needs_review_explicitly: true
  preserve_unicode_cjk_text: true
  garbled_text_requires_review: true
  do_not_recommend_unverified_cjk_dwg: true
install_targets:
  openclaw_default: ~/.openclaw/workspace-cadbot/skills/openclaw-pdf-to-cad
verification:
  command: scripts/verify_openclaw_install.sh
  required_files:
    - SKILL.md
    - openclaw.skill.json
    - scripts/run_pdf_to_cad.sh
    - scripts/openclaw_pdf_to_cad.py
